<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#070c1a"/>
      <stop offset="100%" stop-color="#0d1e32"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00a4dc" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#004c70" stop-opacity="0.25"/>
    </linearGradient>
    <!-- Aurora blur filters -->
    <filter id="aur-wide" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="aur-ray" x="-60%" y="-20%" width="220%" height="140%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <clipPath id="clip">
      <circle cx="128" cy="128" r="128"/>
    </clipPath>
  </defs>

  <circle cx="128" cy="128" r="128" fill="url(#bg)"/>

  <g clip-path="url(#clip)">

    <!-- ── Aurora Borealis ────────────────────────────────────────── -->

    <!-- Jellyfin purple crown at top — vivid -->
    <ellipse cx="80"  cy="10" rx="120" ry="65" fill="#cc55ee" opacity="0.60" filter="url(#aur-wide)"/>
    <ellipse cx="196" cy="8"  rx="90"  ry="50" fill="#aa44cc" opacity="0.50" filter="url(#aur-wide)"/>

    <!-- Jellyfin blue main aurora band -->
    <path d="M-20,85 C 32,28 72,95 128,52 C 184,9 224,68 276,40
             L 276,105 C 224,133 184,74 128,117 C 72,160 32,93 -20,150 Z"
          fill="#00a4dc" opacity="0.55" filter="url(#aur-wide)"/>

    <!-- Purple-to-blue transition band -->
    <path d="M-20,45 C 44,88 92,24 128,66 C 164,108 214,52 276,78
             L 276,50 C 214,24 164,80 128,38 C 92,-4 44,60 -20,17 Z"
          fill="#8833cc" opacity="0.45" filter="url(#aur-wide)"/>

    <!-- Vertical curtain rays: Jellyfin purple → blue -->
    <line x1="65"  y1="-8" x2="50"  y2="158" stroke="#cc55ee" stroke-width="18" stroke-opacity="0.55" filter="url(#aur-ray)"/>
    <line x1="108" y1="-8" x2="98"  y2="158" stroke="#00a4dc" stroke-width="24" stroke-opacity="0.65" filter="url(#aur-ray)"/>
    <line x1="150" y1="-8" x2="156" y2="158" stroke="#00a4dc" stroke-width="18" stroke-opacity="0.55" filter="url(#aur-ray)"/>
    <line x1="196" y1="-8" x2="204" y2="158" stroke="#cc55ee" stroke-width="14" stroke-opacity="0.48" filter="url(#aur-ray)"/>

    <!-- ── Mountain silhouettes ───────────────────────────────────── -->

    <!-- Far mountains -->
    <polygon points="0,256 0,90 38,58 70,88 95,46 118,100 118,256"   fill="#18273a"/>
    <polygon points="256,256 256,72 220,44 188,78 160,36 138,100 138,256" fill="#18273a"/>

    <!-- Near mountains (more saturated blue) -->
    <polygon points="0,256 0,110 30,80 58,108 82,62 106,116 106,256" fill="#1f324e"/>
    <polygon points="256,256 256,92 228,60 200,90 174,50 150,116 150,256" fill="#1f324e"/>

    <!-- Snow caps — bright -->
    <polygon points="95,46 88,60 102,60"    fill="#e8f6ff" opacity="0.92"/>
    <polygon points="160,36 153,52 167,52"  fill="#e8f6ff" opacity="0.92"/>
    <polygon points="82,62 77,73 87,73"     fill="#e8f6ff" opacity="0.60"/>
    <polygon points="174,50 169,62 179,62"  fill="#e8f6ff" opacity="0.60"/>
    <polygon points="220,44 215,56 225,56"  fill="#e8f6ff" opacity="0.50"/>
    <polygon points="38,58 33,70 43,70"     fill="#e8f6ff" opacity="0.45"/>

    <!-- ── Fjord water ────────────────────────────────────────────── -->
    <rect x="0" y="156" width="256" height="100" fill="url(#water)"/>

    <!-- Jellyfin blue tint on water surface -->
    <rect x="0" y="156" width="256" height="100" fill="#00a4dc" opacity="0.12"/>

    <!-- Horizon line -->
    <line x1="0" y1="156" x2="256" y2="156" stroke="#00a4dc" stroke-width="1.5" stroke-opacity="0.60"/>

    <!-- Water ripples -->
    <line x1="76"  y1="174" x2="180" y2="174" stroke="#00c8f0" stroke-width="1.4" stroke-opacity="0.38"/>
    <line x1="92"  y1="191" x2="164" y2="191" stroke="#00c8f0" stroke-width="1.1" stroke-opacity="0.27"/>
    <line x1="106" y1="207" x2="150" y2="207" stroke="#00c8f0" stroke-width="0.9" stroke-opacity="0.18"/>

    <!-- Mountain reflection in water -->
    <polygon points="106,156 82,200 58,172 30,196 0,170 0,256 106,256"     fill="#18273a" opacity="0.45"/>
    <polygon points="150,156 174,202 200,174 228,198 256,172 256,256 150,256" fill="#18273a" opacity="0.45"/>

  </g>
</svg>
