<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Background gradient: near-black to deep navy -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111416"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>

    <!-- Water gradient: dark teal shimmer -->
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00a4dc" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00a4dc" stop-opacity="0.06"/>
    </linearGradient>

    <!-- Accent glow for play button -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00a4dc" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#00a4dc" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip to rounded rect -->
    <clipPath id="clip">
      <rect width="256" height="256" rx="48" ry="48"/>
    </clipPath>
  </defs>

  <!-- Rounded background -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>

  <g clip-path="url(#clip)">

    <!-- ── Mountain silhouettes ────────────────────────────────────── -->

    <!-- Left cliff (darker, further back) -->
    <polygon points="0,256 0,90 38,58 70,88 95,46 118,100 118,256" fill="#1a2535"/>

    <!-- Right cliff (darker, further back) -->
    <polygon points="256,256 256,72 220,44 188,78 160,36 138,100 138,256" fill="#1a2535"/>

    <!-- Left cliff (closer, lighter) -->
    <polygon points="0,256 0,110 30,80 58,108 82,62 106,116 106,256" fill="#212f42"/>

    <!-- Right cliff (closer, lighter) -->
    <polygon points="256,256 256,92 228,60 200,90 174,50 150,116 150,256" fill="#212f42"/>

    <!-- Snow caps on tallest peaks -->
    <polygon points="95,46 88,60 102,60" fill="#cce8f4" opacity="0.7"/>
    <polygon points="160,36 153,52 167,52" fill="#cce8f4" opacity="0.7"/>

    <!-- ── Water / fjord surface ───────────────────────────────────── -->
    <rect x="0" y="156" width="256" height="100" fill="url(#water)"/>

    <!-- Horizon line (subtle accent) -->
    <line x1="0" y1="156" x2="256" y2="156" stroke="#00a4dc" stroke-width="1" stroke-opacity="0.20"/>

    <!-- Water ripple lines -->
    <line x1="88"  y1="176" x2="168" y2="176" stroke="#00a4dc" stroke-width="1.2" stroke-opacity="0.18"/>
    <line x1="100" y1="192" x2="156" y2="192" stroke="#00a4dc" stroke-width="1.0" stroke-opacity="0.13"/>
    <line x1="110" y1="207" x2="146" y2="207" stroke="#00a4dc" stroke-width="0.8" stroke-opacity="0.10"/>

    <!-- Mountain reflection in water (inverted, faded) -->
    <polygon points="106,156 82,200 58,172 30,196 0,170 0,256 106,256" fill="#1a2535" opacity="0.35"/>
    <polygon points="150,156 174,202 200,174 228,198 256,172 256,256 150,256" fill="#1a2535" opacity="0.35"/>

    <!-- ── Play button ─────────────────────────────────────────────── -->

    <!-- Soft glow behind play button -->
    <circle cx="128" cy="128" r="52" fill="url(#glow)"/>

    <!-- Circle ring -->
    <circle cx="128" cy="128" r="36" fill="none" stroke="#00a4dc" stroke-width="2.5" stroke-opacity="0.85"/>

    <!-- Play triangle -->
    <polygon points="120,112 120,144 150,128" fill="#00a4dc"/>

  </g>
</svg>
